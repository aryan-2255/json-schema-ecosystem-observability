<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Schema Ecosystem Metrics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      border-radius: 9999px;
      background: #1e293b;
      border: 1px solid #334155;
      font-size: 0.75rem;
      color: #64748b;
      font-family: monospace;
    }

    .card-grid {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px 32px;
      min-width: 220px;
      text-align: center;
    }

    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .card .sublabel {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 4px;
    }

    .card.accent-blue .value  { color: #60a5fa; }
    .card.accent-green .value { color: #34d399; }

    .chart-wrapper {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 700px;
    }

    .chart-wrapper h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 24px;
    }

    canvas { max-height: 340px; }

    .error-msg {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 20px 28px;
      font-size: 0.9rem;
      max-width: 500px;
      text-align: center;
    }

    footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #334155;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>JSON Schema Ecosystem Metrics</h1>
    <p>A snapshot of the JSON Schema ecosystem — downloaded from live APIs.</p>
    <span class="badge" id="timestamp-badge">Loading…</span>
  </header>

  <div class="card-grid" id="stat-cards"></div>

  <div class="chart-wrapper">
    <h2>Side-by-side comparison</h2>
    <canvas id="metricsChart"></canvas>
  </div>

  <footer>
    Generated by json-schema-observability &nbsp;·&nbsp; Data sourced from npm &amp; GitHub APIs
  </footer>

  <script>
    /**
     * Reads ../output/metrics.json and renders the chart.
     * metrics is now an array of { name, value, source, description } objects.
     *
     * Serve from project root with: python3 -m http.server 8080
     * Then open: http://localhost:8080/visualization/chart.html
     */
    async function loadAndRender() {
      let data;
      try {
        const response = await fetch("../output/metrics.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        data = await response.json();
      } catch (err) {
        document.body.innerHTML = `
          <div class="error-msg">
            <strong>Could not load metrics.json</strong><br><br>
            ${err.message}<br><br>
            Serve the project with a local HTTP server:<br>
            <code>python3 -m http.server 8080</code><br>
            then open <code>http://localhost:8080/visualization/chart.html</code>
          </div>`;
        return;
      }

      // Timestamp badge
      const ts = new Date(data.timestamp);
      document.getElementById("timestamp-badge").textContent =
        "Snapshot: " + ts.toUTCString();

      // metrics is an array — index by name so order doesn't matter
      const byName = Object.fromEntries(data.metrics.map((m) => [m.name, m]));
      const ajv    = byName["ajv_weekly_downloads"];
      const github = byName["github_json_schema_topic_repos"];

      // Stat cards — labels pulled directly from the metric objects
      const cardGrid = document.getElementById("stat-cards");
      cardGrid.innerHTML = `
        <div class="card accent-blue">
          <div class="label">${ajv.name.replaceAll("_", " ")}</div>
          <div class="value">${(ajv.value / 1_000_000).toFixed(1)}M</div>
          <div class="sublabel">${ajv.source} — last 7 days</div>
        </div>
        <div class="card accent-green">
          <div class="label">${github.name.replaceAll("_", " ")}</div>
          <div class="value">${github.value.toLocaleString()}</div>
          <div class="sublabel">${github.source} — topic: json-schema</div>
        </div>
      `;

      // Bar chart — axis labels come from each metric's description field
      const ctx = document.getElementById("metricsChart").getContext("2d");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: [ajv.description, github.description],
          datasets: [
            {
              label: "Count",
              data: [ajv.value, github.value],
              backgroundColor: ["rgba(96,165,250,0.25)", "rgba(52,211,153,0.25)"],
              borderColor:     ["rgba(96,165,250,0.9)",  "rgba(52,211,153,0.9)"],
              borderWidth: 2,
              borderRadius: 6,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => " " + Number(ctx.raw).toLocaleString(),
              },
            },
          },
          scales: {
            x: {
              ticks: { color: "#94a3b8" },
              grid:  { color: "#1e293b" },
            },
            y: {
              ticks: {
                color: "#94a3b8",
                callback: (v) =>
                  v >= 1_000_000
                    ? (v / 1_000_000).toFixed(0) + "M"
                    : v >= 1_000
                    ? (v / 1_000).toFixed(0) + "K"
                    : v,
              },
              grid: { color: "#1e293b" },
            },
          },
        },
      });
    }

    loadAndRender();
  </script>
</body>
</html>
